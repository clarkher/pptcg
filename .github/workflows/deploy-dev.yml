name: Deploy Dev Preview

on:
  push:
    branches: [dev]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-backend-staging:
    name: Deploy Backend → Railway Staging (Singapore)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy backend to staging service
        run: railway up backend --path-as-root --service ${{ secrets.RAILWAY_STAGING_SERVICE_ID }} --ci
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_PROD_ENV_ID }}

  deploy-frontend:
    name: Deploy Frontend → Vercel Dev Preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          # 測試站打測試後端（Railway staging, 新加坡 → Neon dev 分支），不碰正式資料
          VITE_API_URL: https://pptcg-backend-staging-production.up.railway.app/api
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
      - name: Prepare Vercel prebuilt output
        working-directory: frontend
        run: |
          mkdir -p .vercel/output/static
          cp -r dist/. .vercel/output/static/
          cat > .vercel/output/config.json << 'EOF'
          {
            "version": 3,
            "routes": [
              {
                "src": "/assets/(.*)",
                "headers": { "cache-control": "public, max-age=31536000, immutable" },
                "continue": true
              },
              { "handle": "filesystem" },
              { "src": "/(.*)", "dest": "/index.html" }
            ]
          }
          EOF
          echo '{"projectId":"${{ secrets.VERCEL_PROJECT_ID }}","orgId":"${{ secrets.VERCEL_ORG_ID }}"}' > .vercel/project.json
      - name: Install Vercel CLI
        run: npm install -g vercel
      - name: Clear Vercel rootDirectory (prevent frontend/frontend path conflict)
        run: |
          curl -s -X PATCH \
            "https://api.vercel.com/v9/projects/${{ secrets.VERCEL_PROJECT_ID }}?teamId=${{ secrets.VERCEL_ORG_ID }}" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"rootDirectory": null}' > /dev/null
      - name: Deploy preview to Vercel
        id: deploy
        working-directory: frontend
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_ORG_ID }} 2>/dev/null | tail -1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Alias to fixed dev URL
        run: |
          vercel alias set "${{ steps.deploy.outputs.url }}" pptcg-dev.vercel.app \
            --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_ORG_ID }}
          echo "✅ Dev preview 已更新：https://pptcg-dev.vercel.app"
